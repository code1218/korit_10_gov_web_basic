<body>
    <script>
        const circleArea = (r) => {
            const pi = Math.PI;
            return r * r * pi;  //반지름 제곱 * PI
        }

        const circleArea2 = function (r) {
            return r * r * Math.PI;  //반지름 제곱 * PI
        }

        const circleArea3 = r => r * r * Math.PI;
        const circleArea4 = r => (r ** 2) * Math.PI;    // ** 거듭제곱 연산자

        console.log(circleArea(5));
        console.log(circleArea(10));
    </script>
